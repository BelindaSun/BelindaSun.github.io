<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五线谱练习 — Belinda Sun</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --color-text-primary:#1A1A18;
  --color-text-secondary:#6B6860;
  --color-text-tertiary:#A8A59C;
  --color-text-info:#1a56a0;
  --color-text-success:#1D6A4A;
  --color-text-danger:#A32D2D;
  --color-background-primary:#FFFFFF;
  --color-background-secondary:#F5F0E8;
  --color-background-info:#E0EFFD;
  --color-background-success:#E0F5EC;
  --color-background-danger:#FDEAEA;
  --color-border-primary:rgba(44,44,42,0.8);
  --color-border-secondary:rgba(44,44,42,0.2);
  --color-border-tertiary:rgba(44,44,42,0.12);
  --color-border-info:#93C5F0;
  --color-border-success:#7DCCA8;
  --color-border-danger:#F0A0A0;
  --border-radius-md:8px;
  --border-radius-lg:12px;
}
body{font-family:var(--font-sans);background:#FDFCFA;min-height:100vh;}
.page-nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:0.5px solid rgba(44,44,42,0.12);background:#FDFCFA;}
.page-nav a{font-family:Georgia,serif;font-size:1rem;color:#3D2A5C;text-decoration:none;}
.page-nav span{font-size:0.85rem;color:#7A5FA0;}
.wrap{padding:1rem;max-width:680px;margin:0 auto;font-family:var(--font-sans)}
.tabs{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
.tab{padding:6px 16px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-secondary);cursor:pointer;font-size:13px;font-family:var(--font-sans);transition:all .15s}
.tab.active{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-primary);font-weight:500}
.tab:hover:not(.active){background:var(--color-background-secondary)}
.panel{display:none}.panel.active{display:block}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem}
.note-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(72px,1fr));gap:8px;margin-top:1rem}
.note-btn{padding:10px 4px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-primary);cursor:pointer;font-family:var(--font-sans);transition:all .15s;text-align:center}
.note-btn:hover{background:var(--color-background-secondary)}
.note-btn.playing{background:var(--color-background-success);border-color:var(--color-border-success)}
.note-btn .nn{font-size:18px;font-weight:500}
.note-btn .ns{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.quiz-opts{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:1rem}
.opt{padding:10px 4px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-primary);cursor:pointer;font-size:15px;font-weight:500;font-family:var(--font-sans);transition:all .15s}
.opt:hover{background:var(--color-background-secondary)}
.opt.correct{background:var(--color-background-success);border-color:var(--color-border-success);color:var(--color-text-success)}
.opt.wrong{background:var(--color-background-danger);border-color:var(--color-border-danger);color:var(--color-text-danger)}
.score-bar{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--color-text-secondary);margin-bottom:1rem}
.pill{width:10px;height:10px;border-radius:50%;background:var(--color-border-tertiary)}
.pill.ok{background:#1D9E75}.pill.err{background:#E24B4A}
.feedback{font-size:13px;margin-top:8px;min-height:20px;color:var(--color-text-secondary)}
.next-btn{margin-top:.75rem;padding:7px 18px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-primary);cursor:pointer;font-size:13px;font-family:var(--font-sans);display:none}
.next-btn:hover{background:var(--color-background-secondary)}
.scale-row{display:flex;gap:0;margin:1rem 0;overflow-x:auto}
.scale-key{flex:1;min-width:44px;padding:10px 0;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);cursor:pointer;font-family:var(--font-sans);font-size:12px;text-align:center;transition:background .1s}
.scale-key:first-child{border-radius:var(--border-radius-md) 0 0 var(--border-radius-md)}
.scale-key:last-child{border-radius:0 var(--border-radius-md) var(--border-radius-md) 0}
.scale-key:hover{background:var(--color-background-secondary)}
.scale-key.lit{background:var(--color-background-info);color:var(--color-text-info)}
.interval-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:1rem}
.int-btn{padding:7px 14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-secondary);cursor:pointer;font-size:12px;font-family:var(--font-sans)}
.int-btn:hover{background:var(--color-background-secondary)}
.int-btn.active{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-primary)}
.play-btn{padding:7px 18px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;cursor:pointer;font-size:13px;font-family:var(--font-sans);color:var(--color-text-primary)}
.play-btn:hover{background:var(--color-background-secondary)}
.reset-btn{margin-left:auto;padding:4px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-secondary);cursor:pointer;font-size:12px;font-family:var(--font-sans)}
.mode-btn{margin-left:auto;padding:5px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;cursor:pointer;font-size:12px;font-family:var(--font-sans);color:var(--color-text-primary)}
</style>
</head>
<body>
<nav class="page-nav">
  <a href="index.html">Belinda Sun</a>
  <div class="nav-right">
    <a href="tinkerland.html">🔧 Tinkerland</a>
  </div>
</nav>

<div class="wrap">
<div class="tabs">
  <button class="tab active" onclick="switchTab('notes')">🎵 认识音符</button>
  <button class="tab" onclick="switchTab('scale')">🎹 音阶练耳</button>
  <button class="tab" onclick="switchTab('quiz')">🎯 听音测验</button>
</div>

<div class="panel active" id="panel-notes">
  <div class="card">
    <svg id="note-staff" width="100%" viewBox="0 0 580 195">
      <line x1="60" y1="60" x2="540" y2="60" stroke="#1A1A18" stroke-width="1.2" opacity=".7"/>
      <line x1="60" y1="80" x2="540" y2="80" stroke="#1A1A18" stroke-width="1.2" opacity=".7"/>
      <line x1="60" y1="100" x2="540" y2="100" stroke="#1A1A18" stroke-width="1.2" opacity=".7"/>
      <line x1="60" y1="120" x2="540" y2="120" stroke="#1A1A18" stroke-width="1.2" opacity=".7"/>
      <line x1="60" y1="140" x2="540" y2="140" stroke="#1A1A18" stroke-width="1.2" opacity=".7"/>
      <text x="64" y="138" font-size="88" fill="#1A1A18" opacity=".8" style="font-family:serif">𝄞</text>
      <g id="staff-notes"></g>
      <ellipse id="hl-dot" cx="-99" cy="0" rx="13" ry="9" fill="#1D9E75" opacity="0" style="transition:all .25s"/>
      <line id="hl-led" x1="0" y1="0" x2="0" y2="0" stroke="#1D9E75" stroke-width="1.5" opacity="0"/>
      <text id="hl-label" x="290" y="22" text-anchor="middle" font-size="13" fill="#1D9E75" font-family="-apple-system,sans-serif" opacity="0"></text>
    </svg>
  </div>
  <div class="note-grid" id="note-btns"></div>
  <p style="font-size:12px;color:#A8A59C;margin:12px 0 0">点击音名 → 五线谱高亮 + 播放声音</p>
</div>

<div class="panel" id="panel-scale">
  <div class="card">
    <p style="font-size:13px;color:#6B6860;margin:0 0 8px">点击琴键听单音，或播放整段音阶</p>
    <div class="scale-row" id="scale-keys"></div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="play-btn" onclick="playScale()">▶ 顺序播放</button>
      <button class="play-btn" onclick="playScale(true)">🔀 随机播放</button>
    </div>
  </div>
  <div class="card">
    <p style="font-size:13px;font-weight:500;margin:0 0 8px">听音程差异</p>
    <p style="font-size:12px;color:#6B6860;margin:0 0 8px">选一对音，感受它们之间的距离感</p>
    <div class="interval-row" id="interval-btns"></div>
    <p style="font-size:12px;color:#A8A59C;margin:10px 0 0" id="interval-desc"></p>
  </div>
</div>

<div class="panel" id="panel-quiz">
  <div class="score-bar">
    <span id="score-txt">得分：0 / 0</span>
    <div style="display:flex;gap:4px" id="pills"></div>
    <button class="reset-btn" onclick="resetQuiz()">重置</button>
  </div>
  <div class="card">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <p style="font-size:13px;color:#6B6860;margin:0" id="quiz-mode-label">听音辨位：点击播放，选出对应音名</p>
      <button class="mode-btn" onclick="toggleQuizMode()" id="mode-toggle-btn">切换：看谱选音</button>
    </div>
    <div id="quiz-visual"></div>
    <div class="quiz-opts" id="quiz-opts"></div>
    <div class="feedback" id="quiz-fb"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">下一题 →</button>
  </div>
</div>
</div>

<script>
// ─── 音频引擎（手机兼容版）─────────────────────────────────────────────────
// 核心原则：AudioContext 必须在用户手势的同步调用栈里创建和使用
// 不能提前创建好再 resume —— iOS Safari 会忽略这种做法

let _ctx = null;

function getCtx() {
  // 每次在手势事件里同步调用：若没有则新建，若挂起则 resume
  if (!_ctx) {
    _ctx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (_ctx.state === 'suspended') {
    _ctx.resume();
  }
  return _ctx;
}

function playTone(freq, dur, delay) {
  dur = dur || 0.6;
  delay = delay || 0;
  // 直接在当前调用栈里拿 ctx（此时一定在用户手势里）
  var ac = getCtx();
  var t = ac.currentTime;
  var osc = ac.createOscillator();
  var gain = ac.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.001, t + delay);
  gain.gain.linearRampToValueAtTime(0.35, t + delay + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, t + delay + dur);
  osc.connect(gain);
  gain.connect(ac.destination);
  osc.start(t + delay);
  osc.stop(t + delay + dur + 0.05);
}

function playNote(n, delay) {
  playTone(n.freq, 0.7, delay || 0);
}

// ─── 数据 ───────────────────────────────────────────────────────────────────
const NOTES=[
  {name:'C',solfege:'Do / 1',freq:261.63,cy:160,ledger:true,pos:'第一加线下'},
  {name:'D',solfege:'Re / 2',freq:293.66,cy:150,ledger:false,pos:'第一间下方'},
  {name:'E',solfege:'Mi / 3',freq:329.63,cy:140,ledger:false,pos:'第一线'},
  {name:'F',solfege:'Fa / 4',freq:349.23,cy:130,ledger:false,pos:'第一间'},
  {name:'G',solfege:'Sol / 5',freq:392.00,cy:120,ledger:false,pos:'第二线'},
  {name:'A',solfege:'La / 6',freq:440.00,cy:110,ledger:false,pos:'第二间'},
  {name:'B',solfege:'Si / 7',freq:493.88,cy:100,ledger:false,pos:'第三线'},
  {name:'C5',solfege:'Do / 1↑',freq:523.25,cy:90,ledger:false,pos:'第三间'},
  {name:'D5',solfege:'Re / 2↑',freq:587.33,cy:80,ledger:false,pos:'第四线'},
  {name:'E5',solfege:'Mi / 3↑',freq:659.25,cy:70,ledger:false,pos:'第四间'},
];
const INTERVALS=[
  {label:'小二度',notes:['C','D'],desc:'半音，非常紧张，如"眼泪"'},
  {label:'大二度',notes:['C','D'],desc:'全音，相邻级，Do→Re'},
  {label:'纯四度',notes:['C','F'],desc:'稳定上升，如"婚礼进行曲"开头'},
  {label:'纯五度',notes:['C','G'],desc:'最和谐之一，空旷辽远'},
  {label:'纯八度',notes:['C','C5'],desc:'同音高低，完全谐和'},
];

// ─── 音符面板 ────────────────────────────────────────────────────────────────
let lastBtn=null;
function highlightNote(n,btn){
  if(lastBtn){lastBtn.classList.remove('playing');}
  if(btn){btn.classList.add('playing');lastBtn=btn;setTimeout(function(){btn.classList.remove('playing');},750);}
  var hl=document.getElementById('hl-dot');
  hl.setAttribute('cx',noteX(n));hl.setAttribute('cy',n.cy);hl.setAttribute('opacity','1');
  var led=document.getElementById('hl-led');
  if(n.ledger){led.setAttribute('x1',noteX(n)-18);led.setAttribute('y1',n.cy);led.setAttribute('x2',noteX(n)+18);led.setAttribute('y2',n.cy);led.setAttribute('opacity','0.8');}
  else{led.setAttribute('opacity','0');}
  var lbl=document.getElementById('hl-label');
  lbl.textContent=n.name+'（'+n.solfege+'）— '+n.pos;lbl.setAttribute('opacity','1');
  playNote(n);  // 在按钮 onclick 的同步栈里，直接调用
  setTimeout(function(){hl.setAttribute('opacity','0');led.setAttribute('opacity','0');lbl.setAttribute('opacity','0');},900);
}
function noteX(n){return 130+NOTES.indexOf(n)*46;}
function buildNoteStaff(){var g=document.getElementById('staff-notes');NOTES.forEach(function(n,i){var x=noteX(n);var el=document.createElementNS('http://www.w3.org/2000/svg','ellipse');el.setAttribute('cx',x);el.setAttribute('cy',n.cy);el.setAttribute('rx','11');el.setAttribute('ry','8');el.setAttribute('fill','#6B6860');el.setAttribute('opacity','0.2');g.appendChild(el);if(n.ledger){var ll=document.createElementNS('http://www.w3.org/2000/svg','line');ll.setAttribute('x1',x-15);ll.setAttribute('y1',n.cy);ll.setAttribute('x2',x+15);ll.setAttribute('y2',n.cy);ll.setAttribute('stroke','#6B6860');ll.setAttribute('stroke-width','1');ll.setAttribute('opacity','0.3');g.appendChild(ll);}var t=document.createElementNS('http://www.w3.org/2000/svg','text');t.setAttribute('x',x);t.setAttribute('y','182');t.setAttribute('text-anchor','middle');t.setAttribute('font-size','11');t.setAttribute('fill','#A8A59C');t.setAttribute('font-family','-apple-system,sans-serif');t.textContent=n.name;g.appendChild(t);});}
function buildNoteBtns(){var c=document.getElementById('note-btns');NOTES.forEach(function(n){var b=document.createElement('button');b.className='note-btn';b.id='nbtn-'+n.name;b.innerHTML='<div class="nn">'+n.name+'</div><div class="ns">'+n.solfege+'</div>';b.onclick=function(){highlightNote(n,b);};c.appendChild(b);});}

// ─── 音阶面板 ────────────────────────────────────────────────────────────────
function buildScaleKeys(){var c=document.getElementById('scale-keys');NOTES.forEach(function(n){var b=document.createElement('button');b.className='scale-key';b.id='skey-'+n.name;b.innerHTML='<div style="font-weight:500">'+n.name+'</div><div style="font-size:11px;color:#6B6860">'+n.solfege.split('/')[0].trim()+'</div>';b.onclick=function(){playNote(n);litKey(n.name);};c.appendChild(b);});}
function litKey(name){document.querySelectorAll('.scale-key').forEach(function(k){k.classList.remove('lit');});var k=document.getElementById('skey-'+name);if(k){k.classList.add('lit');setTimeout(function(){k.classList.remove('lit');},750);}}
var scaleTimer=null;
// 顺序/随机播放音阶：delay > 0 的音用 playTone 里的 delay 参数实现
// 但每个 playTone 都是在同一个按钮 onclick 的调用栈里发起的，所以有效
function playScale(shuffle){
  if(scaleTimer)clearTimeout(scaleTimer);
  var list=shuffle?[].concat(NOTES).sort(function(){return Math.random()-.5;}):NOTES;
  list.forEach(function(n,i){
    playTone(n.freq,0.55,i*0.55);
    setTimeout(function(){litKey(n.name);},i*550);
  });
}
function buildIntervalBtns(){var c=document.getElementById('interval-btns');INTERVALS.forEach(function(iv){var b=document.createElement('button');b.className='int-btn';b.textContent=iv.label;b.onclick=function(){document.querySelectorAll('.int-btn').forEach(function(x){x.classList.remove('active');});b.classList.add('active');document.getElementById('interval-desc').textContent=iv.desc;var n0=NOTES.find(function(n){return n.name===iv.notes[0];});var n1=NOTES.find(function(n){return n.name===iv.notes[1];});playNote(n0,0);playNote(n1,0.65);};c.appendChild(b);});}

// ─── 测验面板 ────────────────────────────────────────────────────────────────
var qScore=0,qTotal=0,qHistory=[],qCurrent=null,qAnswered=false,qMode='listen';
var QUIZ_CY=[144,134,124,114,104,94,84,74,64,54];
function toggleQuizMode(){qMode=qMode==='listen'?'read':'listen';document.getElementById('quiz-mode-label').textContent=qMode==='listen'?'听音辨位：点击播放，选出对应音名':'看谱辨音：根据音符位置选出音名';document.getElementById('mode-toggle-btn').textContent=qMode==='listen'?'切换：看谱选音':'切换：听音辨位';nextQuestion();}
function buildQuizVisual(n){
  var c=document.getElementById('quiz-visual');
  if(qMode==='listen'){
    // 播放按钮：onclick 直接调 playNote，在手势同步栈里
    c.innerHTML='<div style="text-align:center;margin:8px 0"><button id="quiz-play-btn" style="padding:10px 24px;border:0.5px solid rgba(44,44,42,0.2);border-radius:8px;background:transparent;cursor:pointer;font-size:14px;font-family:-apple-system,sans-serif">▶ 播放声音</button><p style="font-size:12px;color:#A8A59C;margin:6px 0 0">可多次点击</p></div>';
    document.getElementById('quiz-play-btn').onclick=function(){playNote(qCurrent);};
  }else{
    var ledX=200,cy=n.cy;
    var lines=[44,64,84,104,124].map(function(y){return '<line x1="40" y1="'+y+'" x2="360" y2="'+y+'" stroke="#1A1A18" stroke-width="1.2" opacity=".7"/>';}).join('');
    var ledger=n.ledger?'<line x1="'+(ledX-18)+'" y1="'+cy+'" x2="'+(ledX+18)+'" y2="'+cy+'" stroke="#1A1A18" stroke-width="1.2"/>':'';
    c.innerHTML='<svg width="100%" viewBox="0 0 400 160" style="margin:4px 0">'+lines+'<text x="44" y="122" font-size="80" fill="#1A1A18" opacity=".8" style="font-family:serif">𝄞</text>'+ledger+'<ellipse cx="'+ledX+'" cy="'+cy+'" rx="14" ry="10" fill="#1A1A18"/></svg>';
  }
}
function nextQuestion(){
  qAnswered=false;
  document.getElementById('next-btn').style.display='none';
  document.getElementById('quiz-fb').textContent='';
  document.querySelectorAll('.opt').forEach(function(b){b.classList.remove('correct','wrong');});
  var idx=Math.floor(Math.random()*NOTES.length);
  qCurrent=Object.assign({},NOTES[idx],{cy:QUIZ_CY[idx]});
  buildQuizVisual(qCurrent);
  var pool=NOTES.map(function(n){return n.name;}).filter(function(n){return n!==qCurrent.name;}).sort(function(){return Math.random()-.5;}).slice(0,3);
  var opts=[].concat(pool,[qCurrent.name]).sort(function(){return Math.random()-.5;});
  var c=document.getElementById('quiz-opts');c.innerHTML='';
  opts.forEach(function(o){var b=document.createElement('button');b.className='opt';b.textContent=o;b.onclick=function(){checkAnswer(o,b);};c.appendChild(b);});
  if(qMode==='listen')setTimeout(function(){playNote(qCurrent);},200);
}
function checkAnswer(chosen,btn){
  if(qAnswered)return;qAnswered=true;qTotal++;
  var correct=qCurrent.name;var ok=chosen===correct;
  if(ok){qScore++;btn.classList.add('correct');document.getElementById('quiz-fb').textContent='✓ 正确！';}
  else{btn.classList.add('wrong');document.querySelectorAll('.opt').forEach(function(b){if(b.textContent===correct)b.classList.add('correct');});var nd=NOTES.find(function(n){return n.name===correct;});document.getElementById('quiz-fb').textContent='✗ 是 '+correct+'（'+(nd?nd.solfege:'')+'）';}
  qHistory.push(ok);
  document.getElementById('score-txt').textContent='得分：'+qScore+' / '+qTotal;
  var pills=document.getElementById('pills');pills.innerHTML=qHistory.slice(-10).map(function(r){return '<div class="pill '+(r?'ok':'err')+'"></div>';}).join('');
  document.getElementById('next-btn').style.display='inline-block';
}
function resetQuiz(){qScore=0;qTotal=0;qHistory=[];qAnswered=false;qCurrent=null;document.getElementById('score-txt').textContent='得分：0 / 0';document.getElementById('pills').innerHTML='';document.getElementById('quiz-fb').textContent='';document.getElementById('next-btn').style.display='none';nextQuestion();}
function switchTab(t){['notes','scale','quiz'].forEach(function(id,i){document.querySelectorAll('.tab')[i].classList.toggle('active',id===t);document.getElementById('panel-'+id).classList.toggle('active',id===t);});if(t==='quiz'&&!qCurrent)nextQuestion();}
buildNoteStaff();buildNoteBtns();buildScaleKeys();buildIntervalBtns();
</script>
</body>
</html>

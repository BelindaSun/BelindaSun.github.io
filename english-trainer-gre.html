      }

        font-size: 0.85rem;
        color: var(--text-muted);
      }

        display: grid;
        gap: 1.5rem;
      }

        font-size: 2rem;
        font-weight: normal;
        color: var(--text);

        font-size: 1.2rem;
        font-weight: normal;
        color: var(--text);
        margin-bottom: 1rem;

        padding: 1.5rem;
        border: 0.5px solid var(--border);
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
      }

        margin-bottom: 0.75rem;
        background: var(--warm);

        font-weight: normal;
        color: var(--text);
        margin-bottom: 0.2rem;

        color: var(--text-muted);
        margin-bottom: 0.4rem;
      }

        display: inline-block;

        border-radius: 20px;
        background: var(--accent-light);

        letter-spacing: 0.04em;
        margin-bottom: 0.5rem;

        font-size: 1rem;
        color: var(--text);
        margin-bottom: 0.4rem;
      }

        font-size: 0.88rem;
        color: var(--text-muted);
        line-height: 1.7;
        font-style: italic;
      }

        color: var(--text-muted);
        margin-bottom: 0.75rem;
        line-height: 1.7;
      }
      .quiz-question b {

      }

        border-radius: 8px;
        border: 0.5px solid var(--border);
        background: var(--cream);
        color: var(--text);
        font-family: var(--serif);
        margin-bottom: 0.75rem;
        outline: none;
      }

      }

        gap: 0.75rem;
        flex-wrap: wrap;

        border: none;
        border-radius: 20px;
        font-size: 0.88rem;
        cursor: pointer;
        background: var(--text);
        color: var(--cream);
        font-family: var(--sans);

        gap: 0.75rem;

      // ---------- 核心逻辑 ----------
      const GROUP_SIZE = 5;
      const TOTAL_WORDS = vocabularyBank.length;
      let currentOffset = 0;
      let currentWords = [];
      let quizIndex = 0,
        score = 0;
      let lastScoredIndex = null;

      function getBaseStartIndex() {
        const today = new Date();
        const seed =
          today.getFullYear() * 365 + today.getMonth() * 31 + today.getDate();
        return (seed * 5) % TOTAL_WORDS;
      }

      function getWordsByOffset(offset) {
        const baseStart = getBaseStartIndex();
        let start = (baseStart + offset * GROUP_SIZE) % TOTAL_WORDS;
        const result = [];
        for (let i = 0; i < GROUP_SIZE; i++) {
          const idx = (start + i) % TOTAL_WORDS;
          result.push({ ...vocabularyBank[idx] });
        }
        return result;
      }

      function refresh() {
        currentWords = getWordsByOffset(currentOffset);
        if (currentWords.length === 0) return;
        quizIndex = 0;
        score = 0;
        lastScoredIndex = null;
        renderWords();
        renderQuiz();
        updateProgress();
      }

      function renderWords() {
        const container = document.getElementById("wordList");
        if (!container) return;
        container.innerHTML = "";
        currentWords.forEach((item) => {
          const div = document.createElement("div");
          div.className = "word-card";
          const pronHtml = item.pronunciation
            ? `<div class="pronunciation">/${item.pronunciation}/</div>`
            : "";
          div.innerHTML = `
      <div class="word">${item.word}</div>
      ${pronHtml}
      <span class="level">${item.level}</span>
      <div class="meaning">${item.meaning}</div>
      <div class="example">💡 ${item.example}</div>
    `;
          container.appendChild(div);
        });
      }

      function renderQuiz() {
        if (!currentWords.length) return;
        const current = currentWords[quizIndex];
        document.getElementById("quizQuestion").innerHTML =
          `哪个英文单词表示：<b>${current.meaning}</b>？`;
        document.getElementById("answerInput").value = "";
        document.getElementById("result").innerHTML = "";
        document.getElementById("result").className = "result";
      }

      function updateProgress() {
        const fill = document.getElementById("progressFill");
        const text = document.getElementById("scoreText");
        if (fill) fill.style.width = `${(score / GROUP_SIZE) * 100}%`;
        if (text) text.textContent = `今日掌握：${score}/${GROUP_SIZE}`;
      }

      function checkAnswer() {
        if (!currentWords.length) return;
        const answer = document
          .getElementById("answerInput")
          .value.trim()
          .toLowerCase();
        const current = currentWords[quizIndex];
        const resultDiv = document.getElementById("result");
        if (answer === current.word.toLowerCase()) {
          resultDiv.innerHTML = "✅ 正确！这个词已经开始进入你的长期记忆了。";
          resultDiv.className = "result ok";
          if (lastScoredIndex !== quizIndex) {
            score++;
            lastScoredIndex = quizIndex;
            updateProgress();
          }
        } else {
          resultDiv.innerHTML = `❌ 正确答案是：<em>${current.word}</em>`;
          resultDiv.className = "result err";
        }
      }

      function nextQuestion() {
        if (!currentWords.length) return;
        quizIndex = (quizIndex + 1) % GROUP_SIZE;
        lastScoredIndex = null;
        renderQuiz();
        updateProgress();
      }

      function nextGroup() {
        currentOffset++;
        refresh();
      }
      function prevGroup() {
        currentOffset--;
        refresh();
      }
      function resetToToday() {
        currentOffset = 0;
        refresh();
      }

      function bindEvents() {
        document.getElementById("checkBtn").onclick = checkAnswer;
        document.getElementById("nextBtn").onclick = nextQuestion;
        document.getElementById("prevGroupBtn").onclick = prevGroup;
        document.getElementById("nextGroupBtn").onclick = nextGroup;
        document.getElementById("resetTodayBtn").onclick = resetToToday;
        document.getElementById("legacyResetBtn").onclick = resetToToday;
      }

      refresh();
      bindEvents();

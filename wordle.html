<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Wordle — Belinda Sun</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap");

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #fdfcfa;
        --bg2: #f5f0e8;
        --bg3: #ede7d9;
        --text: #1a1a18;
        --text2: #6b6860;
        --text3: #a8a59c;
        --border: rgba(44, 44, 42, 0.15);
        --border2: rgba(44, 44, 42, 0.25);
        --correct: #2d7a57;
        --correct-bg: #d6f0e4;
        --correct-border: #7dcca8;
        --present: #8a6a1a;
        --present-bg: #f5e6b8;
        --present-border: #d4b95a;
        --absent: #6b6860;
        --absent-bg: #e8e3d8;
        --absent-border: rgba(44, 44, 42, 0.2);
        --radius: 6px;
        --radius-lg: 10px;
      }
      body {
        font-family: "DM Mono", monospace;
        background: var(--bg);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* NAV */
      .page-nav {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 2rem;
        border-bottom: 0.5px solid var(--border);
        background: var(--bg);
      }
      .page-nav a {
        font-family: "DM Serif Display", serif;
        font-size: 1rem;
        color: #3d2a5c;
        text-decoration: none;
      }
      .page-nav .nav-right a {
        font-size: 0.85rem;
        color: #7a5fa0;
      }

      /* MAIN */
      .container {
        width: 100%;
        max-width: 480px;
        padding: 1.5rem 1rem 2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.25rem;
      }

      /* HEADER */
      .header {
        text-align: center;
      }
      .header h1 {
        font-family: "DM Serif Display", serif;
        font-size: 2rem;
        color: var(--text);
        letter-spacing: -0.02em;
      }
      .header p {
        font-size: 11px;
        color: var(--text3);
        margin-top: 4px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      /* STATUS BAR */
      .status-bar {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 12px;
        color: var(--text2);
        width: 100%;
      }
      .streak {
        display: flex;
        align-items: center;
        gap: 5px;
        background: var(--bg2);
        border: 0.5px solid var(--border);
        border-radius: 20px;
        padding: 4px 10px;
        font-size: 11px;
      }
      .streak-num {
        font-weight: 500;
        color: var(--text);
      }
      .new-game-btn {
        margin-left: auto;
        padding: 5px 14px;
        border: 0.5px solid var(--border2);
        border-radius: var(--radius);
        background: transparent;
        color: var(--text2);
        cursor: pointer;
        font-size: 12px;
        font-family: "DM Mono", monospace;
        transition: background 0.15s;
      }
      .new-game-btn:hover {
        background: var(--bg2);
      }

      /* GRID */
      .grid {
        display: grid;
        grid-template-rows: repeat(6, 1fr);
        gap: 5px;
      }
      .row {
        display: flex;
        gap: 5px;
      }
      .tile {
        width: 54px;
        height: 54px;
        border: 0.5px solid var(--border2);
        border-radius: var(--radius);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "DM Mono", monospace;
        font-size: 20px;
        font-weight: 500;
        color: var(--text);
        background: var(--bg);
        transition: transform 0.1s;
        position: relative;
        overflow: hidden;
      }
      .tile.filled {
        border-color: var(--border2);
        animation: pop 0.1s ease;
      }
      .tile.correct {
        background: var(--correct-bg);
        border-color: var(--correct-border);
        color: var(--correct);
      }
      .tile.present {
        background: var(--present-bg);
        border-color: var(--present-border);
        color: var(--present);
      }
      .tile.absent {
        background: var(--absent-bg);
        border-color: var(--absent-border);
        color: var(--absent);
      }
      .tile.reveal {
        animation: flip 0.45s ease forwards;
      }
      .tile.shake {
        animation: shake 0.4s ease;
      }
      .tile.bounce {
        animation: bounce 0.5s ease;
      }

      @keyframes pop {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.08);
        }
        100% {
          transform: scale(1);
        }
      }
      @keyframes flip {
        0% {
          transform: rotateX(0);
          background: var(--bg);
        }
        49% {
          transform: rotateX(90deg);
          background: var(--bg);
        }
        50% {
          transform: rotateX(90deg);
        }
        100% {
          transform: rotateX(0);
        }
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-6px);
        }
        40% {
          transform: translateX(6px);
        }
        60% {
          transform: translateX(-4px);
        }
        80% {
          transform: translateX(4px);
        }
      }
      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        40% {
          transform: translateY(-10px);
        }
        60% {
          transform: translateY(-5px);
        }
      }

      /* MESSAGE */
      .message {
        font-size: 13px;
        color: var(--text2);
        min-height: 20px;
        text-align: center;
        letter-spacing: 0.02em;
      }
      .message.win {
        color: var(--correct);
        font-weight: 500;
      }
      .message.lose {
        color: #a32d2d;
      }

      /* KEYBOARD */
      .keyboard {
        display: flex;
        flex-direction: column;
        gap: 6px;
        width: 100%;
      }
      .kb-row {
        display: flex;
        justify-content: center;
        gap: 5px;
      }
      .key {
        height: 44px;
        min-width: 34px;
        padding: 0 6px;
        border: 0.5px solid var(--border2);
        border-radius: var(--radius);
        background: var(--bg2);
        color: var(--text);
        font-family: "DM Mono", monospace;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition:
          background 0.1s,
          transform 0.05s;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      .key:active {
        transform: scale(0.94);
      }
      .key.wide {
        min-width: 52px;
        font-size: 11px;
      }
      .key.correct {
        background: var(--correct-bg);
        border-color: var(--correct-border);
        color: var(--correct);
      }
      .key.present {
        background: var(--present-bg);
        border-color: var(--present-border);
        color: var(--present);
      }
      .key.absent {
        background: var(--absent-bg);
        border-color: var(--absent-border);
        color: var(--absent);
      }

      /* STATS PANEL */
      .stats {
        width: 100%;
        background: var(--bg2);
        border: 0.5px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1rem 1.25rem;
        display: none;
      }
      .stats.show {
        display: block;
      }
      .stats h3 {
        font-family: "DM Serif Display", serif;
        font-size: 1rem;
        color: var(--text);
        margin-bottom: 0.75rem;
      }
      .stats-row {
        display: flex;
        gap: 16px;
        margin-bottom: 0.75rem;
      }
      .stat {
        text-align: center;
        flex: 1;
      }
      .stat-num {
        font-size: 1.5rem;
        font-weight: 500;
        color: var(--text);
      }
      .stat-label {
        font-size: 10px;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-top: 2px;
      }
      .dist {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .dist-row {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
      }
      .dist-label {
        width: 10px;
        color: var(--text2);
        text-align: right;
      }
      .dist-bar-wrap {
        flex: 1;
        background: var(--bg3);
        border-radius: 2px;
        height: 14px;
        overflow: hidden;
      }
      .dist-bar {
        height: 100%;
        background: var(--border2);
        border-radius: 2px;
        min-width: 4px;
        transition: width 0.5s ease;
        display: flex;
        align-items: center;
        padding-left: 5px;
        font-size: 10px;
        color: var(--text2);
      }
      .dist-bar.cur {
        background: var(--correct-bg);
        color: var(--correct);
      }

      /* HOW TO PLAY */
      .howto {
        width: 100%;
      }
      .howto h3 {
        font-family: "DM Serif Display", serif;
        font-size: 1rem;
        color: var(--text);
        margin-bottom: 0.75rem;
      }
      .howto p {
        font-size: 12px;
        color: var(--text2);
        margin-bottom: 0.75rem;
        line-height: 1.6;
      }
      .howto strong {
        color: var(--text);
      }
      .howto-examples {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .howto-row {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }
      .howto-row p {
        font-size: 12px;
        color: var(--text2);
        margin: 0;
        line-height: 1.5;
      }
      .ex-tile {
        width: 34px;
        height: 34px;
        border: 0.5px solid var(--border2);
        border-radius: var(--radius);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "DM Mono", monospace;
        font-size: 14px;
        font-weight: 500;
        color: var(--text);
        background: var(--bg);
      }
      .ex-tile.correct {
        background: var(--correct-bg);
        border-color: var(--correct-border);
        color: var(--correct);
      }
      .ex-tile.present {
        background: var(--present-bg);
        border-color: var(--present-border);
        color: var(--present);
      }
      .ex-tile.absent {
        background: var(--absent-bg);
        border-color: var(--absent-border);
        color: var(--absent);
      }

      /* DIVIDER */
      .divider {
        width: 100%;
        height: 0.5px;
        background: var(--border);
      }

      @media (max-width: 400px) {
        .tile {
          width: 46px;
          height: 46px;
          font-size: 17px;
        }
        .key {
          height: 40px;
          min-width: 29px;
          font-size: 12px;
        }
        .key.wide {
          min-width: 44px;
        }
      }
    </style>

    <div class="container">
      <div class="header">
        <h1>Wordle</h1>
        <p>Guess the 5-letter word in 6 tries</p>
      </div>

      <div class="status-bar">
        <div class="streak">
          🔥 Streak: <span class="streak-num" id="streak-num">0</span>
        </div>
        <button class="new-game-btn" onclick="newGame()">New word</button>
      </div>

      <div class="grid" id="grid"></div>

      <div class="message" id="message"></div>

      <div class="keyboard" id="keyboard"></div>

      <div class="divider"></div>

      <div class="stats" id="stats">

          <div class="stat">

          <div class="stat">

          </div>
        </div>
        <div class="dist" id="dist"></div>
      </div>

      <div class="divider"></div>

      <div class="howto">
        <h3>怎么玩</h3>
        <p>
          猜一个 <strong>5个字母</strong> 的英文单词，共
          <strong>6次</strong> 机会。
        </p>
        <div class="howto-examples">
          <div class="howto-row">
            <div class="ex-tile correct">W</div>
            <div class="ex-tile">E</div>
            <div class="ex-tile">A</div>
            <div class="ex-tile">R</div>
            <div class="ex-tile">Y</div>
            <p><strong>W</strong> 在正确位置 🟩</p>
          </div>
          <div class="howto-row">
            <div class="ex-tile">P</div>
            <div class="ex-tile">I</div>
            <div class="ex-tile present">L</div>
            <div class="ex-tile">L</div>
            <div class="ex-tile">S</div>
            <p><strong>L</strong> 在单词里，但位置不对 🟨</p>
          </div>
          <div class="howto-row">
            <div class="ex-tile">V</div>
            <div class="ex-tile">A</div>
            <div class="ex-tile">G</div>
            <div class="ex-tile">U</div>
            <div class="ex-tile absent">E</div>
            <p><strong>E</strong> 不在这个单词里 ⬜</p>
          </div>
        </div>
      </div>
    </div>

      // ── 初始化 ────────────────────────────────────────────────────────────────────
      function init() {
        buildGrid();
        buildKeyboard();
        newGame();
        document.addEventListener("keydown", onKeyDown);
      }

      function newGame() {
        answer = WORDS[Math.floor(Math.random() * WORDS.length)];
        guesses = [];
        current = "";
        gameOver = false;
        setMessage("");
        document.getElementById("stats").classList.remove("show");

        renderKeyboard();
      }

      // ── 网格 ──────────────────────────────────────────────────────────────────────
      function buildGrid() {
        var g = document.getElementById("grid");
        g.innerHTML = "";
        for (var r = 0; r < 6; r++) {
          var row = document.createElement("div");
          row.className = "row";
          row.id = "row-" + r;
          for (var c = 0; c < 5; c++) {
            var tile = document.createElement("div");
            tile.className = "tile";
            tile.id = "tile-" + r + "-" + c;
            row.appendChild(tile);
          }
          g.appendChild(row);
        }
      }

      function renderGrid() {
        for (var r = 0; r < 6; r++) {
          for (var c = 0; c < 5; c++) {
            var tile = document.getElementById("tile-" + r + "-" + c);
            tile.textContent = "";
            tile.className = "tile";
          }
        }
        // 已提交的行
        guesses.forEach(function (guess, r) {
          var result = score(guess);
          for (var c = 0; c < 5; c++) {
            var tile = document.getElementById("tile-" + r + "-" + c);
            tile.textContent = guess[c];
            tile.className = "tile " + result[c];
          }
        });
        // 当前输入行
        var row = guesses.length;
        if (row < 6 && !gameOver) {
          for (var c = 0; c < 5; c++) {
            var tile = document.getElementById("tile-" + row + "-" + c);
            tile.textContent = current[c] || "";
            tile.className = "tile" + (current[c] ? " filled" : "");
          }
        }
      }

      // ── 键盘 ──────────────────────────────────────────────────────────────────────
      var ROWS = [
        ["Q", "W", "E", "R", "T", "Y", "U", "I", "O", "P"],
        ["A", "S", "D", "F", "G", "H", "J", "K", "L"],
        ["ENTER", "Z", "X", "C", "V", "B", "N", "M", "⌫"],
      ];

      function buildKeyboard() {
        var kb = document.getElementById("keyboard");
        kb.innerHTML = "";
        ROWS.forEach(function (row) {
          var rowEl = document.createElement("div");
          rowEl.className = "kb-row";
          row.forEach(function (k) {
            var btn = document.createElement("button");
            btn.className = "key" + (k.length > 1 ? " wide" : "");
            btn.textContent = k;
            btn.id = "key-" + k;
            btn.setAttribute("data-key", k);
            btn.onclick = function () {
              handleKey(k);
            };
            rowEl.appendChild(btn);
          });
          kb.appendChild(rowEl);
        });
      }

      function renderKeyboard() {
        // 先清掉所有颜色
        document.querySelectorAll(".key").forEach(function (k) {
          k.classList.remove("correct", "present", "absent");
        });
        // 根据已猜历史着色（correct > present > absent 优先级）
        var state = {};
        guesses.forEach(function (guess) {
          var result = score(guess);
          for (var i = 0; i < 5; i++) {
            var letter = guess[i];
            var cur = state[letter];
            if (result[i] === "correct") state[letter] = "correct";
            else if (result[i] === "present" && cur !== "correct")
              state[letter] = "present";
            else if (!cur) state[letter] = "absent";
          }
        });
        Object.keys(state).forEach(function (letter) {
          var el = document.getElementById("key-" + letter);
          if (el) el.classList.add(state[letter]);
        });
      }

      // ── 输入处理 ──────────────────────────────────────────────────────────────────
      function onKeyDown(e) {
        if (e.ctrlKey || e.metaKey || e.altKey) return;
        if (e.key === "Enter") handleKey("ENTER");
        else if (e.key === "Backspace") handleKey("⌫");
        else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
      }

      function handleKey(k) {
        if (gameOver) return;
        if (k === "⌫") {
          current = current.slice(0, -1);
          renderGrid();
        } else if (k === "ENTER") {
          submit();
        } else if (current.length < 5) {
          current += k;
          renderGrid();
          // 弹跳动画
          var row = guesses.length;
          var tile = document.getElementById(
            "tile-" + row + "-" + (current.length - 1),
          );
          tile.classList.remove("filled");
          void tile.offsetWidth;
          tile.classList.add("filled");
        }
      }

      function submit() {
        if (current.length < 5) {
          shakeRow(guesses.length);
          setMessage("Not enough letters");
          setTimeout(function () {
            setMessage("");
          }, 1200);
          return;
        }
        if (!ALL_VALID.has(current)) {
          shakeRow(guesses.length);
          setMessage("Not in word list");
          setTimeout(function () {
            setMessage("");
          }, 1200);
          return;
        }

        var row = guesses.length;
        var result = score(current);
        guesses.push(current);
        current = "";

        // 翻转动画
        revealRow(row, result, function () {
          renderKeyboard();
          var won = result.every(function (r) {
            return r === "correct";
          });
          if (won) {
            gameOver = true;
            stats.played++;
            stats.wins++;
            stats.streak++;
            stats.best = Math.max(stats.best, stats.streak);
            stats.dist[row] = (stats.dist[row] || 0) + 1;
            saveStats();
            bounceRow(row);
            var msgs = [
              "Genius!",
              "Magnificent!",
              "Impressive!",
              "Splendid!",
              "Great!",
              "Phew!",
            ];
            setTimeout(function () {
              setMessage(msgs[row] || "Nice!", "win");
              showStats(row);
              document.getElementById("streak-num").textContent = stats.streak;
            }, 400);
          } else if (guesses.length === 6) {
            gameOver = true;
            stats.played++;
            stats.streak = 0;
            saveStats();
            setTimeout(function () {
              setMessage("The word was " + answer, "lose");
              showStats(-1);
              document.getElementById("streak-num").textContent = stats.streak;
            }, 400);
          }
        });
      }

      // ── 评分 ──────────────────────────────────────────────────────────────────────
      function score(guess) {
        var result = ["absent", "absent", "absent", "absent", "absent"];
        var ansArr = answer.split("");
        var gArr = guess.split("");
        // 先标 correct
        for (var i = 0; i < 5; i++) {
          if (gArr[i] === ansArr[i]) {
            result[i] = "correct";
            ansArr[i] = null;
            gArr[i] = null;
          }
        }
        // 再标 present
        for (var i = 0; i < 5; i++) {
          if (gArr[i] === null) continue;
          var idx = ansArr.indexOf(gArr[i]);
          if (idx !== -1) {
            result[i] = "present";
            ansArr[idx] = null;
          }
        }
        return result;
      }

      // ── 动画 ──────────────────────────────────────────────────────────────────────
      function revealRow(row, result, cb) {
        var delay = 0;
        for (var c = 0; c < 5; c++) {
          (function (col, d) {
            var tile = document.getElementById("tile-" + row + "-" + col);
            setTimeout(function () {
              tile.classList.add("reveal");
              // 翻到一半时换颜色
              setTimeout(function () {
                tile.classList.remove("reveal");
                tile.classList.add(result[col]);
              }, 225);
            }, d);
          })(c, delay);
          delay += 100;
        }
        setTimeout(cb, delay + 300);
      }

      function shakeRow(row) {
        var rowEl = document.getElementById("row-" + row);
        rowEl.classList.remove("shake");
        void rowEl.offsetWidth;
        rowEl.classList.add("shake");
        setTimeout(function () {
          rowEl.classList.remove("shake");
        }, 400);
      }

      function bounceRow(row) {
        var delay = 0;
        for (var c = 0; c < 5; c++) {
          (function (col, d) {
            setTimeout(function () {
              var tile = document.getElementById("tile-" + row + "-" + col);
              tile.classList.add("bounce");
              setTimeout(function () {
                tile.classList.remove("bounce");
              }, 500);
            }, d);
          })(c, delay);
          delay += 80;
        }
      }

      // ── UI ────────────────────────────────────────────────────────────────────────
      function setMessage(txt, cls) {
        var el = document.getElementById("message");
        el.textContent = txt;
        el.className = "message" + (cls ? " " + cls : "");
      }

      function showStats(winRow) {
        var s = stats;
        document.getElementById("s-played").textContent = s.played;
        document.getElementById("s-win").textContent = s.played
          ? Math.round((s.wins / s.played) * 100) + "%"
          : "0%";
        document.getElementById("s-streak").textContent = s.streak;
        document.getElementById("s-max").textContent = s.best;
        // 分布图
        var dist = document.getElementById("dist");
        dist.innerHTML = "";
        var maxVal = Math.max.apply(null, Object.values(s.dist).concat([1]));
        for (var i = 0; i < 6; i++) {
          var val = s.dist[i] || 0;
          var row = document.createElement("div");
          row.className = "dist-row";
          var pct = Math.round((val / maxVal) * 100);
          row.innerHTML =
            '<span class="dist-label">' +
            (i + 1) +
            "</span>" +
            '<div class="dist-bar-wrap"><div class="dist-bar' +
            (i === winRow ? " cur" : "") +
            '" style="width:' +
            Math.max(pct, 4) +
            '%">' +
            (val || "") +
            "</div></div>";
          dist.appendChild(row);
        }
        setTimeout(function () {
          document.getElementById("stats").classList.add("show");
        }, 600);
      }

      // ── 持久化 ────────────────────────────────────────────────────────────────────
      function loadStats() {
        try {
          var s = JSON.parse(localStorage.getItem("wordle-stats") || "null");
          if (s) return s;
        } catch (e) {}
        return { played: 0, wins: 0, streak: 0, best: 0, dist: {} };
      }
      function saveStats() {
        try {
          localStorage.setItem("wordle-stats", JSON.stringify(stats));
        } catch (e) {}
      }

      init();
      document.getElementById("streak-num").textContent = stats.streak;
    </script>
  </body>
</html>
